# ============================================================
#  Supervision Livraisons - Configuration Backend
# ============================================================

spring.application.name=livraison-backend
server.port=8080

# --- MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/BDG_LivraisonCom_25?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
app.jwt.secret=SuperSecretKeyForLivraisonApp2025!ChangeInProduction
app.jwt.expiration=86400000

# --- CORS ---
app.cors.allowed-origins=*

# --- Logs ---
logging.level.com.livraison=DEBUG
logging.level.org.springframework.security=INFO
